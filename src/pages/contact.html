<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
<header>
    <nav class="navbar navbar-expand-lg py-3">
        <div class="container-fluid px-0">
            <a class="navbar-brand px-2" href="./accessories.html">
                <i class="bi bi-smartwatch fs-1"></i>
            </a>
            <div class="d-flex">
                <button class="btn" type="button" id="cart-button">
                    <i class="bi bi-bag fs-3"></i>
                </button>
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarNav"
                        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <i class="menu-icon bi bi-list fs-1"></i>
                </button>
            </div>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-items border px-0">
                    <ul class="navbar-nav">
                        <li class="nav-item p-3 mx-2 position-relative">
                            <div class="d-flex justify-content-between align-items-center gap-2">
                                <div class="d-flex align-items-center gap-3">
                                    <i class="bi bi-watch"></i>
                                    <a class="nav-link stretched-link" href="../../index.html">Relojes</a>
                                </div>
                                <i class="bi bi-chevron-right"></i>
                            </div>
                        </li>
                        <li class="nav-item p-3 mx-2 position-relative">
                            <div class="d-flex justify-content-between align-items-center gap-2">
                                <div class="d-flex align-items-center gap-3">
                                    <i class="bi bi-gift"></i>
                                    <a class="nav-link stretched-link" href="accessories.html">Accesorios</a>
                                </div>
                                <i class="bi bi-chevron-right"></i>
                            </div>
                        </li>
                        <li class="nav-item p-3 mx-2 position-relative">
                            <div class="d-flex justify-content-between align-items-center gap-2">
                                <div class="d-flex align-items-center gap-3">
                                    <i class="bi bi-envelope"></i>
                                    <a class="nav-link stretched-link" href="contact.html">Contacto</a>
                                </div>
                                <i class="bi bi-chevron-right"></i>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>
</header>

<section class="contact-section">
    <div class="contact-info py-2 container">
        <h1 class="pt-4 mb-3">Contáctanos</h1>
        <p>¡Estamos encantados de hablar contigo!</p>
        <p>Si tienes cualquier otra consulta, por favor envía un correo a <span class="fw-semibold">contacto@ejemplo.com</span></p>
        <p>Nuestro amable equipo de Atención al Cliente estará encantado de ayudarte.</p>
    </div>

    <div class="separator w-90 mx-auto my-3" style="height: 4px; width: 80%; background-color: #dabadd"></div>

    <div class="contact-form container">
        <h2 class="mb-4 pt-4">¿Cómo podemos ayudarte?</h2>
        <form>
            <div class="mb-3">
                <label for="name" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="name" required>
                <label for="email" class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" id="email" required>
                <label for="message" class="form-label">Mensaje</label>
                <textarea class="form-control" id="message" rows="3" required></textarea>
                <button type="submit" class="btn my-3">Enviar</button>
            </div>
        </form>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script type="module" src="../index.js"></script>
</body>
</html>
